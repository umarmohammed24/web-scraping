<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Scraper Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="background-glob"></div>
    <div class="container">
        <header>
            <h1><i class="fas fa-spider"></i> Web Scraper </h1>
            <p>Extract data from any website instantly.</p>
        </header>

        <section class="search-section">
            <div class="input-group">
                <input type="url" id="urlInput" placeholder="https://example.com" required>
                <button id="scrapeBtn" onclick="scrapeUrl()">
                    <span id="btnText">Scrape</span>
                    <i class="fas fa-bolt" id="btnIcon"></i>
                    <div class="loader" id="btnLoader"></div>
                </button>
            </div>
            <p id="errorMsg" class="error-message"></p>
        </section>

        <section id="resultsSection" class="results-section hidden">
            <div class="result-card overview">
                <h2><i class="fas fa-globe"></i> Page Overview</h2>
                <div class="info-row">
                    <span class="label">Title:</span>
                    <span id="pageTitle" class="value"></span>
                </div>
                <div class="info-row">
                    <span class="label">URL:</span>
                    <a id="pageUrl" href="#" target="_blank" class="value link"></a>
                </div>
            </div>

            <div class="result-card content">
                <h2><i class="fas fa-align-left"></i> Text Content</h2>
                <div class="content-box">
                    <p id="pageText"></p>
                </div>
            </div>

            <div class="result-card media">
                <h2><i class="fas fa-images"></i> Extracted Images</h2>
                <div id="imageGallery" class="image-gallery"></div>
            </div>

            <div class="result-card code-section">
                <h2><i class="fas fa-code"></i> HTML Source</h2>
                <div class="code-box">
                    <pre><code id="pageHtml"></code></pre>
                </div>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
